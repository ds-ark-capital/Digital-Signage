<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signage</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
      color: #fff;
    }
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      transition: opacity var(--transition, 1.5s) ease-in-out;
    }
    .slide.active { opacity: 1; }
    .error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <script>
    (async () => {
      const root = document.body;

      function showError(msg) {
        const div = document.createElement("div");
        div.className = "error";
        div.textContent = msg;
        root.appendChild(div);
        console.error(msg);
      }

      let manifest;
      try {
        // Cache-bust so MTRs always get the latest manifest
        const res = await fetch("manifest.json?t=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        manifest = await res.json();
      } catch (e) {
        showError("Failed to load manifest.json — " + e.message);
        return;
      }

      const slidesCfg = Array.isArray(manifest.slides) ? manifest.slides : [];
      if (slidesCfg.length === 0) {
        showError("No slides defined in manifest.json");
        return;
      }

      const defaultDuration = manifest.defaultDurationMs || 10000;
      const transitionMs = manifest.transitionMs || 1500;
      const fit = manifest.fit === "cover" ? "cover" : "contain";

      document.documentElement.style.setProperty("--transition", transitionMs + "ms");

      // Build <img> elements
      const slides = slidesCfg.map((cfg, i) => {
        const img = document.createElement("img");
        img.src = cfg.src;
        img.className = "slide" + (i === 0 ? " active" : "");
        img.style.objectFit = fit;
        img.onerror = () => console.warn("Failed to load image:", cfg.src);
        root.appendChild(img);
        return { el: img, duration: cfg.durationMs || defaultDuration };
      });

      // Cycle
      let current = 0;
      function next() {
        slides[current].el.classList.remove("active");
        current = (current + 1) % slides.length;
        slides[current].el.classList.add("active");
        setTimeout(next, slides[current].duration);
      }
      setTimeout(next, slides[current].duration);

      // Auto-refresh manifest every 5 minutes so MTRs pick up changes
      // without needing the signage session to restart.
      setInterval(async () => {
        try {
          const res = await fetch("manifest.json?t=" + Date.now(), { cache: "no-store" });
          if (!res.ok) return;
          const fresh = await res.json();
          const oldKey = JSON.stringify(slidesCfg);
          const newKey = JSON.stringify(fresh.slides || []);
          if (oldKey !== newKey) {
            // Reload the page to rebuild slideshow cleanly
            location.reload();
          }
        } catch (_) { /* ignore transient errors */ }
      }, 5 * 60 * 1000);
    })();
  </script>
</body>
</html>
